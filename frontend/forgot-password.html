<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberSatDetect | Forgot Password</title>
  <link rel="stylesheet" href="forgot-password.css" />
</head>
<body>

  <!-- Space background -->
  <div id="canvas_container"></div>

  <main class="auth-page">
    <div class="auth-card">

      <div class="brand">
        <h1>CyberSatDetect</h1>
        <p>Reset your password using your registered email.</p>
      </div>

      <form id="forgotForm" autocomplete="off" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" required placeholder="name@email.com" />
        </div>

        <div class="actions">
          <button type="submit" id="resetBtn" class="primary-btn">
            Send reset link
          </button>
        </div>

        <div class="links">
          <a href="login.html">Back to login</a>
          <span class="divider">•</span>
          <a href="signup.html">Create account</a>
        </div>

        <p id="message" class="message"></p>
      </form>

    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
  <script src="forgot-password.js"></script>
</body>
</html>
